category: bitcoin
name: Fractal Bitcoin Node
version: "0.3.3"
tagline: Run a Fractal Bitcoin full node for solo SHA-256 mining
icon: https://raw.githubusercontent.com/wvk2017/test-app/7ee6ed513983f2c73633af29d5aff1430795dad4/fractal-store-solo-node/icon.svg
description: >-
  Run a full Fractal Bitcoin (FB) node on your Umbrel. Fractal Bitcoin is a
  Bitcoin scaling solution using SHA-256 Proof-of-Work with ~30 second block
  times — the only Bitcoin sidechain that runs Bitcoin Core code itself.

  This app automatically downloads and runs fractald (the official Fractal
  Bitcoin daemon) and serves a dashboard showing your node's sync status,
  peer count, and copy-paste commands to connect any SHA-256 ASIC miner.

  Features:
  ‣ Auto-downloads official fractald binary (v0.3.0), ARM + x86 supported)
  ‣ Full Fractal Bitcoin mainnet node with RPC on port 10332
  ‣ Supports merged mining (AuxPoW, ChainID 0x2024)
  ‣ Dashboard showing live block height, sync %, peers, difficulty
  ‣ Pruned mode (~5 GB) — configurable to full archival

  Requirements: ~10 GB free disk, ~512 MB RAM minimum.
  Initial blockchain sync takes several hours.
